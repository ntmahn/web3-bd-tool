<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spores Intelligence Dashboard | Forensic BD Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #05070a;
            color: #e2e8f0;
            background-image: 
                radial-gradient(at 0% 0%, rgba(6, 182, 212, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.05) 0px, transparent 50%);
        }
        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .neon-text { text-shadow: 0 0 10px rgba(6, 182, 212, 0.5); }
        .neon-border { border-color: rgba(6, 182, 212, 0.3); box-shadow: 0 0 15px rgba(6, 182, 212, 0.1); }
        .loading-bar {
            height: 2px;
            background: linear-gradient(90deg, transparent, #06b6d4, transparent);
            background-size: 200% 100%;
            animation: move 2s linear infinite;
        }
        @keyframes move { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const StatItem = ({ label, value, sub }) => (
            <div className="p-3 bg-white/5 rounded-xl border border-white/5">
                <p className="text-[10px] uppercase tracking-wider text-gray-500 font-bold mb-1">{label}</p>
                <p className="text-lg font-bold text-white tracking-tight">{value}</p>
                {sub && <p className="text-[10px] text-cyan-400 font-medium">{sub}</p>}
            </div>
        );

        const App = () => {
            const [url, setUrl] = useState('');
            const [loading, setLoading] = useState(false);
            const [report, setReport] = useState(null);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [report, loading]);

            const analyzeProject = () => {
                if (!url) return;
                setLoading(true);
                // Giả lập logic AI "Forensic" sâu
                setTimeout(() => {
                    const handle = url.split('/').pop().toUpperCase() || "WEB3_PROJECT";
                    setReport({
                        name: handle,
                        status: "Pre-TGE / High Potential",
                        chain: "Arbitrum Ecosystem",
                        sector: "DeFi x AI Infrastructure",
                        backers: ["Binance Labs (Rumored)", "Animoca Brands", "Polygon Ventures"],
                        fundraising: { raised: "$4.2M", round: "Series A", valuation: "$45M" },
                        social: {
                            twitter: "124,500", twitterActive: "High (35 posts/mo)",
                            telegram: "42,000", discord: "18,000",
                            engagement: "3.2% (Tier 2)"
                        },
                        team: { origin: "Singapore / Remote", size: "15-20 Members", doxxed: "Semi-Doxxed" },
                        scores: [
                            { label: "Community Retention", val: 3 },
                            { label: "Social Proof", val: 4 },
                            { label: "Narrative Resonance", val: 8 },
                            { label: "Institutional Trust", val: 5 }
                        ],
                        pitch: `Based on forensic scanning, ${handle} has a strong narrative but suffers from 'Community Hollow'—high follower count with low retention. Spores Network can fix this via our 'User Growth-Hacking' & 'KOL Activation' modules to secure liquidity for your Q3 TGE.`
                    });
                    setLoading(false);
                }, 2500);
            };

            return (
                <div className="min-h-screen pb-20">
                    {/* Top Navigation */}
                    <nav className="border-b border-white/5 bg-black/40 backdrop-blur-md sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <div className="w-8 h-8 bg-cyan-500 rounded flex items-center justify-center shadow-lg shadow-cyan-500/20">
                                    <i data-lucide="shield" className="w-5 h-5 text-black"></i>
                                </div>
                                <span className="font-bold text-lg tracking-tighter">SPORES <span className="text-cyan-400">INTEL</span></span>
                            </div>
                            <div className="hidden md:flex gap-6 text-[11px] uppercase tracking-widest font-bold text-gray-500">
                                <a href="#" className="text-cyan-400">Dashboard</a>
                                <a href="#" className="hover:text-white transition-colors">Forensic Engine</a>
                                <a href="#" className="hover:text-white transition-colors">Campaign Scanner</a>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto px-6 pt-12">
                        {/* Hero Input Area */}
                        <div className="max-w-3xl mx-auto text-center mb-16">
                            <h1 className="text-5xl font-black mb-6 tracking-tighter leading-tight">
                                Intelligence for <span className="text-cyan-400 neon-text">Elite BDs</span>
                            </h1>
                            <div className="relative group">
                                <div className="absolute -inset-1 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-2xl blur opacity-20 group-hover:opacity-40 transition duration-1000"></div>
                                <div className="relative flex glass rounded-2xl overflow-hidden p-2">
                                    <input 
                                        className="bg-transparent flex-1 px-6 py-4 outline-none text-lg font-light"
                                        placeholder="Paste Website or X (Twitter) URL..."
                                        value={url}
                                        onChange={(e) => setUrl(e.target.value)}
                                    />
                                    <button 
                                        onClick={analyzeProject}
                                        className="bg-cyan-500 hover:bg-cyan-400 text-black px-8 py-4 rounded-xl font-bold flex items-center gap-2 transition-all active:scale-95 shadow-xl shadow-cyan-500/20"
                                    >
                                        {loading ? <i data-lucide="refresh-cw" className="w-5 h-5 animate-spin"></i> : <i data-lucide="search" className="w-5 h-5"></i>}
                                        SCAN
                                    </button>
                                </div>
                            </div>
                            {loading && <div className="mt-4 loading-bar rounded-full"></div>}
                        </div>

                        {report && !loading && (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 animate-in fade-in slide-in-from-bottom-4 duration-700">
                                
                                {/* 1. MAIN IDENTITY CARD */}
                                <div className="lg:col-span-4 space-y-6">
                                    <div className="glass p-8 rounded-3xl relative overflow-hidden">
                                        <div className="absolute top-0 right-0 w-32 h-32 bg-cyan-500/5 blur-3xl rounded-full -mr-16 -mt-16"></div>
                                        <div className="flex items-center gap-4 mb-8">
                                            <div className="w-16 h-16 bg-white/5 rounded-2xl border border-white/10 flex items-center justify-center text-3xl font-black text-cyan-400">
                                                {report.name[0]}
                                            </div>
                                            <div>
                                                <h2 className="text-3xl font-bold tracking-tighter">{report.name}</h2>
                                                <div className="flex gap-2 mt-1">
                                                    <span className="bg-cyan-500/10 text-cyan-400 text-[10px] px-2 py-0.5 rounded font-bold uppercase">{report.chain}</span>
                                                    <span className="bg-orange-500/10 text-orange-400 text-[10px] px-2 py-0.5 rounded font-bold uppercase">{report.status}</span>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-2 gap-3 mb-8">
                                            <StatItem label="Total Raised" value={report.fundraising.raised} sub={report.fundraising.round} />
                                            <StatItem label="Est. Valuation" value={report.fundraising.valuation} />
                                        </div>

                                        <div className="space-y-4">
                                            <h3 className="text-[10px] uppercase font-bold text-gray-500 flex items-center gap-2">
                                                <i data-lucide="users" className="w-3 h-3"></i> Core Backers / VCs
                                            </h3>
                                            <div className="flex flex-wrap gap-2">
                                                {report.backers.map((vc, i) => (
                                                    <span key={i} className="px-3 py-1.5 bg-white/5 border border-white/5 rounded-lg text-xs font-medium text-gray-300">
                                                        {vc}
                                                    </span>
                                                ))}
                                            </div>
                                        </div>
                                    </div>

                                    {/* Team & Media */}
                                    <div className="glass p-6 rounded-3xl">
                                        <h3 className="text-xs font-bold text-gray-500 uppercase tracking-widest mb-4">Intelligence Intel</h3>
                                        <div className="space-y-4 text-sm">
                                            <div className="flex justify-between border-b border-white/5 pb-2">
                                                <span className="text-gray-500">Team Location</span>
                                                <span className="font-medium">{report.team.origin}</span>
                                            </div>
                                            <div className="flex justify-between border-b border-white/5 pb-2">
                                                <span className="text-gray-500">Audit/Security</span>
                                                <span className="text-green-400 flex items-center gap-1 font-bold">VERIFIED <i data-lucide="check-circle" className="w-3 h-3"></i></span>
                                            </div>
                                            <div className="flex justify-between">
                                                <span className="text-gray-500">Listing Status</span>
                                                <span className="text-blue-400 font-bold tracking-tight">PRE-LISTING</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* 2. SOCIAL & FORENSIC SCORING */}
                                <div className="lg:col-span-8 space-y-6">
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        <div className="glass p-6 rounded-3xl border-l-4 border-l-blue-500">
                                            <div className="flex justify-between items-start mb-4">
                                                <i data-lucide="twitter" className="w-6 h-6 text-blue-400"></i>
                                                <span className="text-xs text-gray-500">X Metric</span>
                                            </div>
                                            <p className="text-2xl font-bold">{report.social.twitter}</p>
                                            <p className="text-[10px] text-gray-500 mt-1 uppercase font-bold tracking-tighter italic">{report.social.twitterActive}</p>
                                        </div>
                                        <div className="glass p-6 rounded-3xl border-l-4 border-l-indigo-500">
                                            <div className="flex justify-between items-start mb-4">
                                                <i data-lucide="send" className="w-6 h-6 text-indigo-400"></i>
                                                <span className="text-xs text-gray-500">Telegram</span>
                                            </div>
                                            <p className="text-2xl font-bold">{report.social.telegram}</p>
                                            <p className="text-[10px] text-green-400 mt-1 uppercase font-bold">Highly Active</p>
                                        </div>
                                        <div className="glass p-6 rounded-3xl border-l-4 border-l-cyan-500">
                                            <div className="flex justify-between items-start mb-4">
                                                <i data-lucide="activity" className="w-6 h-6 text-cyan-400"></i>
                                                <span className="text-xs text-gray-500">Engagement</span>
                                            </div>
                                            <p className="text-2xl font-bold">{report.social.engagement}</p>
                                            <p className="text-[10px] text-red-400 mt-1 uppercase font-bold">Gap Detected</p>
                                        </div>
                                    </div>

                                    {/* Forensic Charts */}
                                    <div className="glass p-8 rounded-3xl">
                                        <h2 className="text-lg font-bold mb-8 flex items-center gap-2">
                                            <i data-lucide="bar-chart-3" className="w-5 h-5 text-cyan-400"></i> 
                                            Forensic Dimension Assessment
                                        </h2>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-8">
                                            {report.scores.map((s, idx) => (
                                                <div key={idx}>
                                                    <div className="flex justify-between text-xs mb-3">
                                                        <span className="text-gray-400 font-bold uppercase tracking-wider">{s.label}</span>
                                                        <span className={`font-black ${s.val < 5 ? 'text-red-500' : 'text-cyan-400'}`}>{s.val}/10</span>
                                                    </div>
                                                    <div className="h-1.5 w-full bg-white/5 rounded-full overflow-hidden">
                                                        <div 
                                                            className={`h-full transition-all duration-1000 ease-out ${s.val < 5 ? 'bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.5)]' : 'bg-cyan-500 shadow-[0_0_10px_rgba(6,182,212,0.5)]'}`}
                                                            style={{ width: `${s.val * 10}%` }}
                                                        ></div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* 3. SALES PITCH BOX */}
                                    <div className="bg-gradient-to-br from-cyan-900/40 to-blue-900/40 neon-border border p-1 rounded-3xl">
                                        <div className="bg-[#05070a]/80 p-8 rounded-[1.4rem]">
                                            <div className="flex items-center justify-between mb-6">
                                                <h3 className="text-xl font-bold text-cyan-400 flex items-center gap-2 tracking-tight uppercase">
                                                    <i data-lucide="zap" className="w-6 h-6 fill-current"></i> Personalized Sales Weapon
                                                </h3>
                                                <span className="text-[10px] bg-white/10 px-3 py-1 rounded-full font-black tracking-widest text-gray-400 border border-white/5">SPORES-AI v3.0</span>
                                            </div>
                                            <div className="bg-white/5 border border-white/10 p-6 rounded-2xl mb-6 italic text-lg leading-relaxed text-gray-200">
                                                "{report.pitch}"
                                            </div>
                                            <div className="flex gap-4">
                                                <button 
                                                    onClick={() => { navigator.clipboard.writeText(report.pitch); alert("Pitch copied!")}}
                                                    className="flex-1 bg-white text-black font-black py-4 rounded-xl hover:bg-cyan-400 transition-all flex items-center justify-center gap-2"
                                                >
                                                    <i data-lucide="copy" className="w-5 h-5"></i> COPY TO PITCH
                                                </button>
                                                <button className="px-6 border border-white/10 rounded-xl hover:bg-white/5 transition-colors">
                                                    <i data-lucide="download" className="w-5 h-5"></i>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="text-center mt-20 text-gray-600">
                        <p className="text-[10px] tracking-[0.5em] uppercase font-bold">Property of Spores Network • Elite Intelligence Unit</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
